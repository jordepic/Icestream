# The single icestream process: a launcher/supervisor. It discovers icestream tables and submits ONE
# long-lived autonomous Flink job per table (IcestreamTableJob). Each job walks the planner itself —
# indexes DATA runs into Paimon, converts EQ_DEL runs, commits the RowDelta, and advances the iceberg
# watermark from inside the job. There is no master control loop, no conversion channel, and no
# channel server; the pod only needs OUTBOUND access (REST catalog, object store, and — in remote
# mode — the Flink JobManager REST endpoint for job submission).
#
#   flinkMode=remote — submits the autonomous job(s) to a long-lived Flink session cluster
#                      (FlinkDeployment CR managed by flink-kubernetes-operator, configured below).
#   flinkMode=local  — runs the job(s) on an in-pod MiniCluster. For dev / small tables.
{{- $remote := eq .Values.flinkMode "remote" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "icestream.fullname" . }}
  labels:
    {{- include "icestream.labels" . | nindent 4 }}
    app.kubernetes.io/component: icestream
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "icestream.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: icestream
  template:
    metadata:
      labels:
        {{- include "icestream.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: icestream
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "icestream.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: icestream
          image: {{ include "icestream.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- include "icestream.catalogEnv" . | nindent 12 }}
            - name: ICESTREAM_FLINK_MODE
              value: {{ .Values.flinkMode | quote }}
            - name: ICESTREAM_FLINK_PARALLELISM
              value: {{ .Values.appConfig.flink.parallelism | quote }}
            {{- if $remote }}
            - name: ICESTREAM_FLINK_JM_HOST
              value: {{ .Values.appConfig.flink.sessionCluster.jmHost | quote }}
            - name: ICESTREAM_FLINK_JM_PORT
              value: {{ .Values.appConfig.flink.sessionCluster.jmPort | quote }}
            - name: ICESTREAM_FLINK_JARS
              value: {{ .Values.appConfig.flink.jarsPath | quote }}
            {{- end }}
            - name: ICESTREAM_STREAMING_CHECKPOINT_MS
              value: {{ .Values.appConfig.icestream.streamingCheckpointMs | quote }}
            - name: ICESTREAM_PAIMON_COMMIT_TIMEOUT_MS
              value: {{ .Values.appConfig.icestream.paimonCommitTimeoutMs | quote }}
            - name: ICESTREAM_POLL_INTERVAL_SECONDS
              value: {{ .Values.appConfig.icestream.pollIntervalSeconds | quote }}
            - name: ICESTREAM_IDLE_BACKOFF_SECONDS
              value: {{ .Values.appConfig.icestream.idleBackoffSeconds | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
