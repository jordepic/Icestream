{{- if .Values.serviceAccount.create -}}
# Permissions for the master pod to read its FlinkDeployment status (so we can
# tell when the session cluster has come up before we start submitting jobs)
# and to inspect TaskManager pods for diagnostics. No write to the FlinkDeployment
# itself — only the operator mutates that.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "icestream.fullname" . }}
  labels:
    {{- include "icestream.labels" . | nindent 4 }}
rules:
  - apiGroups: ["flink.apache.org"]
    resources: ["flinkdeployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "icestream.fullname" . }}
  labels:
    {{- include "icestream.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "icestream.serviceAccountName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "icestream.fullname" . }}
{{- end -}}
