image:
  repository: icestream/icestream-flink-paimon
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Flink execution mode for the single icestream process (one pod runs the polling control loop AND
# owns the converter that drives the Flink job — there is no separate "worker" pod, no RPC hop):
#   remote — production. Submits ONE standing streaming converter job to the Flink session cluster
#            (managed below by flinkSessionCluster) and hosts the conversion channel server the
#            cluster's TaskManagers dial back into for lookup work-in/results-out. All file reads and
#            writes run distributed on the cluster; only the commit is centralized in this pod.
#   local  — dev/small. Runs the converter on an in-pod MiniCluster (in-process channel, no session
#            cluster, no channel server). Size the pod for the in-pod Flink (Paimon lookup) work.
flinkMode: remote

appConfig:
  iceberg:
    restUri: http://iceberg-rest:8181
    warehouse: s3://warehouse/
    # Free-form iceberg catalog options → env vars ICESTREAM_ICEBERG_OPT_<KEY> (key: upper, . / - → _).
    extraOptions: {}
      # s3.endpoint: http://minio:9000
      # s3.path-style-access: "true"
      # client.region: us-east-1
  paimon:
    warehouse: s3://warehouse/paimon/
    database: icestream
    # Free-form Paimon catalog options → ICESTREAM_PAIMON_OPT_<KEY>.
    extraOptions: {}
      # s3.endpoint: http://minio:9000
      # s3.access-key: minio-user
      # s3.secret-key: minio-pass
  flink:
    parallelism: 4
    # The operator-managed JM service the icestream pod submits the standing job to (flinkMode=remote).
    sessionCluster:
      name: icestream-flink-session
      jmHost: icestream-flink-session-rest
      jmPort: 8081
  icestream:
    # streaming = one long-lived warm job (production). batch = a fresh job per conversion (testing).
    converter: streaming
    pollIntervalSeconds: 10
    idleBackoffSeconds: 60
    maxConcurrentTasks: 4
    streamingCheckpointMs: 2000
    conversionTimeoutMs: 600000

# Conversion channel server (flinkMode=remote only): the session cluster's TaskManagers dial back
# here for the lookup work-in/results-out channel. Exposed as an in-cluster Service at the advertised
# URL (the channel Service DNS).
channel:
  port: 8090
  # Path inside the image to the shaded job jar shipped to the session-cluster TaskManagers
  # (ICESTREAM_FLINK_JARS). Built by the cluster-jar maven profile and copied into the jib image.
  flinkJars: /app/job/icestream-cluster.jar

# The single icestream pod. In flinkMode=remote the heavy compute lives on the session cluster, so
# this can be modest; in flinkMode=local size it for the in-pod Flink (Paimon lookup) work.
resources:
  requests:
    cpu: "1"
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi

# Long-lived Flink session cluster managed by flink-kubernetes-operator (flinkMode=remote only). Set
# enabled=false to point the icestream pod at a pre-existing FlinkDeployment (configure
# appConfig.flink.sessionCluster).
flinkSessionCluster:
  enabled: true
  flinkVersion: v2_0
  image: flink:2.0.0-scala_2.12-java17
  jobManager:
    resource:
      cpu: 1
      memory: 2048m
    replicas: 1
  taskManager:
    resource:
      cpu: 2
      memory: 4096m
    replicas: 2
  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "2"
    # The shaded user jar loads many classes per job submission; bump metaspace so a long-lived
    # session cluster doesn't OOM Metaspace after several submissions.
    taskmanager.memory.jvm-metaspace.size: "1024m"
    state.savepoints.dir: "file:///flink-data/savepoints"
    state.checkpoints.dir: "file:///flink-data/checkpoints"

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: true

podAnnotations: {}
podSecurityContext: {}
extraEnv: []
