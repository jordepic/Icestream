image:
  repository: icestream/icestream-flink-paimon
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Flink execution mode for the icestream launcher pod. The pod is a launcher/supervisor: it discovers
# icestream tables and submits ONE long-lived autonomous Flink job per table. Each job walks the
# planner, indexes into Paimon, converts eq-deletes, commits, and advances its own iceberg watermark —
# there is no master control loop and no conversion channel server.
#   remote — production. Submits the autonomous job(s) to the Flink session cluster (managed below by
#            flinkSessionCluster). All compute runs distributed on the cluster.
#   local  — dev/small. Runs the job(s) on an in-pod MiniCluster (no session cluster). Size the pod
#            for the in-pod Flink (Paimon lookup) work.
flinkMode: remote

appConfig:
  iceberg:
    restUri: http://iceberg-rest:8181
    warehouse: s3://warehouse/
    # Free-form iceberg catalog options → env vars ICESTREAM_ICEBERG_OPT_<KEY> (key: upper, . / - → _).
    extraOptions: {}
      # s3.endpoint: http://minio:9000
      # s3.path-style-access: "true"
      # client.region: us-east-1
  paimon:
    warehouse: s3://warehouse/paimon/
    database: icestream
    # Free-form Paimon catalog options → ICESTREAM_PAIMON_OPT_<KEY>.
    extraOptions: {}
      # s3.endpoint: http://minio:9000
      # s3.access-key: minio-user
      # s3.secret-key: minio-pass
  flink:
    parallelism: 4
    # Path inside the image to the shaded cluster job jar shipped to the session-cluster TaskManagers
    # (ICESTREAM_FLINK_JARS, flinkMode=remote only). Built by the cluster-jar maven profile and copied
    # into the jib image.
    jarsPath: /app/job/icestream-cluster.jar
    # The operator-managed JM service the icestream pod submits the autonomous job(s) to (remote mode).
    sessionCluster:
      name: icestream-flink-session
      jmHost: icestream-flink-session-rest
      jmPort: 8081
  icestream:
    pollIntervalSeconds: 10
    idleBackoffSeconds: 60
    streamingCheckpointMs: 2000
    # How long the in-job committer waits for a DATA run's Paimon index commit to land before
    # advancing the iceberg watermark (ICESTREAM_PAIMON_COMMIT_TIMEOUT_MS).
    paimonCommitTimeoutMs: 600000

# The single icestream pod. In flinkMode=remote the heavy compute lives on the session cluster, so
# this can be modest; in flinkMode=local size it for the in-pod Flink (Paimon lookup) work.
resources:
  requests:
    cpu: "1"
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi

# Long-lived Flink session cluster managed by flink-kubernetes-operator (flinkMode=remote only). Set
# enabled=false to point the icestream pod at a pre-existing FlinkDeployment (configure
# appConfig.flink.sessionCluster).
flinkSessionCluster:
  enabled: true
  flinkVersion: v2_0
  image: flink:2.0.0-scala_2.12-java17
  jobManager:
    resource:
      cpu: 1
      memory: 2048m
    replicas: 1
  taskManager:
    resource:
      cpu: 2
      memory: 4096m
    replicas: 2
  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "2"
    # The shaded user jar loads many classes per job submission; bump metaspace so a long-lived
    # session cluster doesn't OOM Metaspace after several submissions.
    taskmanager.memory.jvm-metaspace.size: "1024m"
    state.savepoints.dir: "file:///flink-data/savepoints"
    state.checkpoints.dir: "file:///flink-data/checkpoints"

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: true

podAnnotations: {}
podSecurityContext: {}
extraEnv: []
