apiVersion: v2
name: icestream-flink-paimon
description: |
  icestream (Flink + Paimon backend) — async eq-delete to deletion-vector indexer
  for Iceberg. The secondary index lives in Paimon on the same object store as the
  iceberg warehouse. A single launcher pod discovers icestream tables and submits one
  long-lived autonomous Flink job per table; each job indexes, converts, commits, and
  advances its own iceberg watermark — there is no master control loop and no
  conversion channel. flinkMode "remote" (production) submits the jobs to a
  flink-kubernetes-operator session cluster; flinkMode "local" (dev) runs them on an
  in-pod MiniCluster.
type: application
version: 1.0.0
appVersion: "1.0-SNAPSHOT"
