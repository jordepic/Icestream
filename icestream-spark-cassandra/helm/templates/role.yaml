apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "icestream.fullname" . }}
  labels:
    {{- include "icestream.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete", "deletecollection", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "icestream.fullname" . }}
  labels:
    {{- include "icestream.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "icestream.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "icestream.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
