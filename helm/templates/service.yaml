{{- if .Values.service.create -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "icestream.fullname" . }}
  labels:
    {{- include "icestream.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  clusterIP: None
  ports:
    - port: {{ .Values.containerPorts.sparkUi }}
      targetPort: spark-ui
      protocol: TCP
      name: spark-ui
  selector:
    {{- include "icestream.selectorLabels" . | nindent 4 }}
{{- end }}
