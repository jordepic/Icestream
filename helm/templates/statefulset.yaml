apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "icestream.fullname" . }}
  labels:
    {{- include "icestream.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "icestream.selectorLabels" . | nindent 6 }}
  serviceName: {{ include "icestream.fullname" . }}
  template:
    metadata:
      annotations:
        checksum/spark-properties: {{ include (print $.Template.BasePath "/spark-properties-cm.yaml") . | sha256sum }}
        checksum/executor-template: {{ include (print $.Template.BasePath "/executor-pod-template-cm.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "icestream.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "icestream.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: spark-properties
          configMap:
            name: {{ include "icestream.fullname" . }}-spark-properties
        - name: executor-pod-template
          configMap:
            name: {{ include "icestream.fullname" . }}-executor-pod-template
      containers:
        - name: master
          image: {{ include "icestream.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: SPARK_DRIVER_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SPARK_DRIVER_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SPARK_NO_DAEMONIZE
              value: "true"
            - name: SPARK_LOCAL_DIRS
              value: {{ .Values.spark.scratchDir }}
            - name: ICESTREAM_CATALOG_NAME
              value: {{ .Values.appConfig.catalog.name | quote }}
            - name: ICESTREAM_CASSANDRA_HOST
              value: {{ .Values.appConfig.cassandra.host | quote }}
            - name: ICESTREAM_CASSANDRA_PORT
              value: {{ .Values.appConfig.cassandra.port | quote }}
            - name: ICESTREAM_CASSANDRA_LOCAL_DC
              value: {{ .Values.appConfig.cassandra.localDc | quote }}
            - name: ICESTREAM_KEYSPACE
              value: {{ .Values.appConfig.icestream.keyspace | quote }}
            - name: ICESTREAM_POLL_INTERVAL_SECONDS
              value: {{ .Values.appConfig.icestream.pollIntervalSeconds | quote }}
            - name: ICESTREAM_IDLE_BACKOFF_SECONDS
              value: {{ .Values.appConfig.icestream.idleBackoffSeconds | quote }}
            - name: ICESTREAM_MAX_CONCURRENT_TASKS
              value: {{ .Values.appConfig.icestream.maxConcurrentTasks | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          command:
            - /opt/entrypoint.sh
          args:
            - /opt/spark/bin/spark-submit
            - --properties-file
            - /opt/spark/conf/spark-properties.conf
            - --conf
            - spark.driver.host=$(SPARK_DRIVER_HOST)
            - --conf
            - spark.driver.pod.name=$(SPARK_DRIVER_POD_NAME)
            - --class
            - io.github.jordepic.icestream.master.Main
            - local:///app/icestream-{{ default .Chart.AppVersion .Values.image.tag }}.jar
          ports:
            - name: spark-ui
              containerPort: {{ .Values.containerPorts.sparkUi }}
              protocol: TCP
          readinessProbe:
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
            httpGet:
              path: /
              port: spark-ui
          livenessProbe:
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
            httpGet:
              path: /
              port: spark-ui
          volumeMounts:
            - name: spark-properties
              mountPath: /opt/spark/conf/spark-properties.conf
              subPath: spark-properties.conf
            - name: executor-pod-template
              mountPath: /opt/spark/conf/executor-pod-template.yaml
              subPath: executor-pod-template.yaml
          resources:
            requests:
              cpu: {{ .Values.spark.driver.cores }}
              memory: {{ int (ceil (mulf .Values.spark.driver.memoryMiB (addf 1 .Values.spark.driver.memoryOverheadFactor))) }}Mi
            limits:
              memory: {{ int (ceil (mulf .Values.spark.driver.memoryMiB (addf 1 .Values.spark.driver.memoryOverheadFactor))) }}Mi
